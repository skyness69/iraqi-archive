<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B6DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B89BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B6DFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer border ring -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#border)" />
  <!-- Inner background -->
  <rect x="14" y="14" width="484" height="484" rx="96" ry="96" fill="url(#bg)" />
  <!-- IA Text -->
  <text
    x="256"
    y="330"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="250"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-8"
  >IA</text>
</svg>
